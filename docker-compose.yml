services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-greenlens}
      POSTGRES_USER: ${POSTGRES_USER:-greenlens}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-greenlens}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-greenlens} -d ${POSTGRES_DB:-greenlens}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      ML_SERVICE_URL: http://ml-service:8001
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy

  adminer:
    image: adminer:4
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy

  # Future AI service container.
  # Keep the service name as "ml-service" so Django can call:
  #   http://ml-service:8001/ml/analyze/
  #
  # Example when the ML team adds its service:
  #
  # ml-service:
  #   build:
  #     context: ./ml-service
  #   restart: unless-stopped
  #   environment:
  #     OPENAI_API_KEY: ${OPENAI_API_KEY}
  #   ports:
  #     - "8001:8001"
  #   command: uvicorn app.main:app --host 0.0.0.0 --port 8001

volumes:
  postgres_data:
